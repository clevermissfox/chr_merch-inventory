<style>
    @layer reset, utilities, project;


    @import url("https://api.fonts.coollabs.io/css2?family=Barlow+Condensed:wght@400;500;600&family=Barlow+Semi+Condensed:wght@400;500;600&family=PT+Sans:wght@400;700&display=swap");

    @layer project {
        body {
            background-color: var(--clr-bg-body);
            font-family: var(--ff-primary);
            font-weight: var(--fw-400);
            color: var(--clr-text);
            line-height: var(--lh-400);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        :is(h1, h2, h3) {
            font-size: var(--_fs-heading);
            text-wrap: balance;
            text-transform: uppercase;
            font-family: var(--ff-secondary);
            line-height: var(--lh-200);
            letter-spacing: var(--default-ls);
            font-weight: var(--fw-400);
        }

        h1 {
            --_fs-heading: var(--fs-600);
            line-height: var(--lh-1);
        }

        h2 {
            --_fs-heading: var(--fs-500);
        }

        h3 {
            --_fs-heading: var(--fs-400);
            font-family: var(--ff-accent);
            letter-spacing: 0.15em;
        }

        p+p {
            margin-bottom: var(--spacing-400);
        }


        button {
            background-color: var(--clr-accent);
            padding: var(--spacing-300) var(--spacing-600);
            border-radius: var(--default-br);
            cursor: pointer;
            font-weight: var(--fw-500);
            text-transform: uppercase;
            letter-spacing: var(--default-ls);
            transition: opacity var(--default-trans-dur) var(--default-timing-bounce),
                transform 0.1s var(--default-timing-bounce);

            &:is(:hover) {
                opacity: 0.9;
            }

            &:is(:active) {
                transform: scale(0.98);
            }
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.secondary {
            background-color: var(--clr-surface);
            border: 0.05em solid;
        }

        input,
        textarea,
        select {
            /* color: var(--clr-text); */
            /* border: 1px solid rgba(255, 255, 255, 0.2); */
            padding: var(--spacing-300);
            border-radius: var(--default-br);

            &:not([type=checkbox], [type=radio]) {
                width: 100%;
            }
        }

        :is(input:focus, textarea:focus, select:focus, .selected-field) {
            outline: 2px solid var(--clr-accent);
            outline-offset: 2px;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        label:not(:has(> [type="radio"])) {
            display: block;
        }

        label,
        .table-wrapper th {
            font-weight: var(--fw-500);
            font-size: var(--fs-300);
            margin-bottom: var(--spacing-200);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* PROJECT SPECIFIC STYLES */

        .card {
            background-color: var(--clr-surface);
            border-radius: var(--default-br);
            border: 0.05em solid var(--clr-card-border);
            padding: var(--spacing-600);
            box-shadow: var(--default-shadow);

            display: grid;
            gap: var(--spacing-400);
        }


        .logo-wrapper {
            width: min(100%, 30ch);
        }

        form {
            accent-color: var(--clr-accent);
        }

        .badge {
            text-transform: uppercase;
            font-weight: var(--fw-500);
            font-family: var(--ff-secondary);
        }


        .table-wrapper {
            overflow: auto;
        }

        .table-wrapper {
            display: grid;
            gap: var(--spacing-400);
        }

        .table-wrapper table {
            border-collapse: collapse;
            width: 100%;
        }

        .table-wrapper table :is(th, td) {
            border: 1px solid var(--clr-card-border);
            padding: 0.325em 0.5em;

            & input[type="number"] {
                border: none;
            }
        }

        @media (width <=768px) {
            header.grid {
                grid-template-columns: auto;
                justify-content: center;
            }

            h1 {
                text-align: center;
                line-height: var(--lh-200);
            }

            .sticky {
                position: fixed;
                inset-inline: 0;
                top: auto;
                bottom: 0;
            }
        }
    }

    @layer reset {
        :root {
            color-scheme: dark;
            font-size: var(--fs-base);
            --ff-primary: "PT Sans", system-ui, sans-serif;
            --ff-secondary: "Barlow Condensed", system-ui, sans-serif;
            --ff-accent: "Barlow Semi-Condensed", system-ui, sans-serif;
            --ff-icon: "Font Awesome 6 Pro";

            --fw-400: 400;
            --fw-500: 500;
            --fw-600: 600;
            --fw-700: 700;

            --fs-base: clamp(0.875rem, 0.6548rem + 1.2259vw, 1.125rem);
            --fs-700: 2em;
            --fs-600: 1.5em;
            --fs-500: 1.25em;
            --fs-400: 1em;
            --fs-300: 0.8625em;
            --fs-200: 0.75em;

            --lh-400: 1.4;
            --lh-200: 1.2;
            --lh-100: 1.1;
            --lh-1: 1;

            /* COLORS + BG-COLORS PROPS */
            --clr-primary: oklch(76% 0.11 84);
            --clr-text: var(--clr-neutral-0);
            --clr-accent: color-mix(in oklch,
                    oklch(80% 0.09 315),
                    transparent var(--alpha-accent, 0%));
            --clr-neutral-0: oklch(100% 0 0);
            --clr-neutral-100: var(--clr-neutral-0);
            --clr-neutral-900: #272727;
            --clr-neutral-1000: oklch(0% 0 0);

            --clr-bg-body: var(--clr-primary);
            --clr-bg-card: var(--clr-neutral-900);
            --clr-card-border: color-mix(in oklch, currentColor, transparent 50%);
            --clr-surface: var(--clr-neutral-900);

            /* SPACING */
            --spacing-700: 2em;
            --spacing-600: 1.5em;
            --spacing-500: 1.25em;
            --spacing-400: 1em;
            --spacing-300: 0.5em;
            --spacing-200: 0.25em;

            --br-400: 0.25em;
            --br-900: 100vw;

            /* DEFAULTS VALUES */
            --default-max-width: 100ch;
            --default-padding: var(--spacing-500);
            --default-ls: 0.125em;
            --default-br: var(--br-400);
            --default-trans-dur: 400ms;
            --default-shadow: 0 2px 8px oklch(0% 0 0 / 0.2);
            --default-timing-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);

            /* INHERITED PROPS */
            interpolate-size: allow-keywords;
        }

        @media (prefers-reduced-motion: no-preference) {
            :is(*, *:before, *:after, #idForSpecificity) {
                scroll-behavior: smooth;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            :is(*, *:before, *:after, #idForSpecificity) {
                transition-duration: 1ms;
            }
        }

        *,
        *:before,
        *:after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :target {
            scroll-margin-block: 3rlh;
        }

        :is(ul, ol) {
            list-style: "";
        }

        img,
        svg {
            display: block;
            max-width: 100%;
        }

        a {
            color: inherit;
            font: inherit;
            text-decoration: none;
            display: inline-block;
        }

        button {
            background-color: transparent;
            color: inherit;
            font: inherit;
            border: none;
            cursor: pointer;
        }

        input:not([type="checkbox"], [type="radio"]),
        textarea,
        select {
            font: inherit;
            color: inherit;
            background-color: transparent;
            border: 1px solid;
            inline-size: 100%;
        }

        /* REMOVE DEFAULT SPINNERS FROM NUMBER INPUTS */
        /* Chrome, Safari, Edge, Opera */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* ... and for Firefox */
        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* INPUT TYPE=SEARCH clear button */
        input[type="search"]::-ms-clear {
            display: none;
            inline-size: 0;
            block-size: 0;
        }

        input[type="search"]::-ms-reveal {
            display: none;
            inline-size: 0;
            block-size: 0;
        }

        input[type="search"]::-webkit-search-decoration,
        input[type="search"]::-webkit-search-cancel-button,
        input[type="search"]::-webkit-search-results-button,
        input[type="search"]::-webkit-search-results-decoration {
            display: none;
        }

        input[type="file"] {
            border-color: var(--clr-primary);
            inline-size: fit-content;
        }

        /* choose file button styles */
        input[type="file"]::file-selector-button {
            background-color: var(--clr-bg-body);
            padding: 0.6em 1.2em;
            border-radius: 0.25em;
            font: inherit;
            cursor: pointer;
        }

        ::-webkit-scrollbar {
            inline-size: 8px;
            block-size: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            border-radius: 10px;
            background: var(--clr-accent);
        }

        ::placeholder {
            color: inherit;
            opacity: 0.6;
        }

        ::selection {
            background-color: oklch(from currentColor calc(l * .75) c h);
            ;
            color: var(--clr-neutral-0);
        }
    }

    /* UTILITIES */
    @layer utilities {
        .visually-hidden {
            clip: rect(0 0 0 0);
            clip-path: inset(100%);
            block-size: 0px;
            inline-size: 0px;
            overflow: hidden;
            position: fixed;
            top: -100%;
            left: -100%;
            white-space: nowrap;
            pointer-events: none;
            visibility: hidden;
        }

        .bg-card {
            background-color: var(--clr-bg-card);
        }

        .bg-accent {
            background-color: var(--clr-accent);
        }

        .wrapper {
            width: min(100%, var(--default-max-width, 100%));
            margin-inline: auto;
        }

        .container {
            container-type: inline-size;
        }

        .card {
            background-color: var(--clr-bg-card);
            padding: var(--default-padding);
            border-radius: var(--default-br);
        }

        .sticky {
            position: sticky;
            top: 0;
        }

        /* TEXT UTILITIES */
        .xsmall {
            font-size: var(--fs-200);
            line-height: var(--lh-100);
        }

        .small {
            font-size: var(--fs-300);
            line-height: var(--lh-100);
        }

        .lg {
            font-size: calc(--fs-400) + 0.1em;
            line-height: var(--lh-100);
        }

        .xlg {
            font-size: calc(--fs-400) + 0.3em;
            line-height: var(--lh-100);
        }

        .bold {
            font-weight: var(--fw-700);
        }

        .thin {
            font-weight: calc(var(--fw-400) - 100);
        }

        .uppercase {
            text-transform: uppercase;
        }

        .underline {
            text-decoration: underline;
        }

        /* GRID AND FLEX UTILITY CLASSES */
        .row {
            display: flex;
        }

        .col {
            display: flex;
            flex-direction: column;
        }

        .grid {
            display: grid;
        }

        .grid.equal-cols {
            --_col-count: 1;
            grid-template-columns: repeat(var(--_col-count), 1fr);
        }

        .pc-cen {
            place-content: center;
        }

        .pi-cen {
            place-items: center;
        }

        .ac-st {
            align-content: start;
        }

        .ac-cen {
            align-content: center;
        }

        .ac-end {
            align-content: end;
        }

        .ac-sb {
            align-content: space-between;
        }

        .ac-str {
            align-content: stretch;
        }

        .ai-st {
            align-items: start;
        }

        .ai-cen {
            align-items: center;
        }

        .ai-end {
            align-items: end;
        }

        .ai-base {
            align-items: baseline;
        }

        .ai-str {
            align-items: stretch;
        }

        .as-st {
            align-self: start;
        }

        .as-cen {
            align-self: center;
        }

        .as-end {
            align-self: end;
        }

        .jc-st {
            justify-content: start;
        }

        .jc-cen {
            justify-content: center;
        }

        .jc-end {
            justify-content: end;
        }

        .jc-sb {
            justify-content: space-between;
        }

        .jc-sa {
            justify-content: space-around;
        }

        .jc-se {
            justify-content: space-evenly;
        }

        .fw-wrap {
            flex-wrap: wrap;
        }

        .gap-2 {
            gap: var(--spacing-700);
        }

        .gap-1 {
            gap: var(--spacing-400);
        }

        .gap-half {
            gap: var(--spacing-300);
        }

        .gap-quarter {
            gap: var(--spacing-200);
        }

        /* SPACING UTILITIES */
        .padding-2 {
            padding: var(--spacing-700);
        }

        .padding-b-2 {
            padding-block: var(--spacing-700);
        }

        .padding-i-2 {
            padding-inline: var(--spacing-700);
        }

        .padding-1half {
            padding: var(--spacing-500);
        }

        .padding-b-1half {
            padding-block: var(--spacing-500);
        }

        .padding-i-1half {
            padding-inline: var(--spacing-500);
        }

        .padding-1 {
            padding: var(--spacing-400);
        }

        .padding-b-1 {
            padding-block: var(--spacing-400);
        }

        .padding-i-1 {
            padding-inline: var(--spacing-400);
        }

        .padding-half {
            padding: var(--spacing-300);
        }

        .padding-b-half {
            padding-block: var(--spacing-300);
        }

        .padding-i-half {
            padding-inline: var(--spacing-300);
        }

        .padding-default {
            padding: var(--default-padding);
        }

        /* 2em */
        .margin-2 {
            margin: var(--spacing-700);
        }

        .margin-b-2 {
            margin-block: var(--spacing-700);
        }

        .margin-bs-2 {
            margin-block-start: var(--spacing-700);
        }

        .margin-be-2 {
            margin-block-end: var(--spacing-700);
        }

        .margin-i-2 {
            margin-inline: var(--spacing-700);
        }

        .margin-is-2 {
            margin-inline-start: var(--spacing-700);
        }

        .margin-ie-2 {
            margin-inline-end: var(--spacing-700);
        }

        /* 1.5em */
        .margin-1half {
            margin: var(--spacing-500);
        }

        .margin-b-1half {
            margin-block: var(--spacing-500);
        }

        .margin-bs-1half {
            margin-block-start: var(--spacing-500);
        }

        .margin-be-1half {
            margin-block-end: var(--spacing-500);
        }

        .margin-i-1half {
            margin-inline: var(--spacing-500);
        }

        .margin-is-1half {
            margin-inline-start: var(--spacing-500);
        }

        .margin-ie-1half {
            margin-inline-end: var(--spacing-500);
        }

        /* 1em */
        .margin-1 {
            margin: var(--spacing-400);
        }

        .margin-b-1 {
            margin-block: var(--spacing-400);
        }

        .margin-bs-1 {
            margin-block-start: var(--spacing-400);
        }

        .margin-be-1 {
            margin-block-end: var(--spacing-400);
        }

        .margin-i-1 {
            margin-inline: var(--spacing-400);
        }

        .margin-is-1 {
            margin-inline-start: var(--spacing-400);
        }

        .margin-ie-1 {
            margin-inline-end: var(--spacing-400);
        }

        /* 0.5em */
        .margin-half {
            margin: var(--spacing-300);
        }

        .margin-b-half {
            margin-block: var(--spacing-300);
        }

        .margin-bs-half {
            margin-block-start: var(--spacing-300);
        }

        .margin-be-half {
            margin-block-end: var(--spacing-300);
        }

        .margin-i-half {
            margin-inline: var(--spacing-300);
        }

        .margin-is-half {
            margin-inline-start: var(--spacing-300);
        }

        .margin-ie-half {
            margin-inline-end: var(--spacing-300);
        }

        /* 0.25em */
        .margin-quarter {
            margin: var(--spacing-200);
        }

        .margin-b-quarter {
            margin-block: var(--spacing-200);
        }

        .margin-bs-quarter {
            margin-block-start: var(--spacing-200);
        }

        .margin-be-quarter {
            margin-block-end: var(--spacing-200);
        }

        .margin-i-quarter {
            margin-inline: var(--spacing-200);
        }

        .margin-is-quarter {
            margin-inline-start: var(--spacing-200);
        }

        .margin-ie-quarter {
            margin-inline-end: var(--spacing-200);
        }

        /* auto */
        .margin-auto {
            margin: auto;
        }

        .margin-i-auto {
            margin-inline: auto;
        }

        .margin-is-auto {
            margin-inline-start: auto;
        }

        .margin-ie-auto {
            margin-inline-end: auto;
        }

        .margin-b-auto {
            margin-block: auto;
        }

        .margin-bs-auto {
            margin-block-start: auto;
        }

        .margin-be-auto {
            margin-block-end: auto;
        }
    }
</style>

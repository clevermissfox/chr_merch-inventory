<style>
  @layer project {
    .inventory-shell {
      padding: var(--spacing-600);
      display: grid;
      gap: var(--spacing-600);
    }

    .hero {
      display: grid;
      gap: var(--spacing-300);
    }

    .hero p {
      max-width: 80ch;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: var(--spacing-300);
    }

    .conflict-summary:not([hidden], .conflict-list:empty) {
      display: grid;
      gap: var(--spacing-300);
      padding: var(--spacing-400);
      border: 1px solid color-mix(in oklch, var(--clr-primary), transparent 55%);
      border-radius: var(--default-br);
      background: color-mix(in oklch, var(--clr-primary), transparent 88%);
    }

    .conflict-summary:has(:nth-child(2 of .conflict-chip)) {
      grid-column: 1 / -1;
    }

    .conflict-list {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-200);
    }

    .conflict-chip {
      border: 1px solid color-mix(in oklch, currentColor, transparent 65%);
      border-radius: 999px;
      padding: 0.35rem 0.65rem;
      font-size: var(--fs-300);
    }

    .metric {
      background: color-mix(in oklch, var(--clr-surface), white 8%);
      border: 1px solid var(--clr-card-border);
      border-radius: var(--default-br);
      padding: var(--spacing-400);
    }

    .metric-value {
      font-size: var(--fs-600);
      line-height: var(--lh-1);
    }

    .toolbar {
      display: grid;
      gap: var(--spacing-300);
      border: 1px solid color-mix(in oklch, currentColor, transparent 70%);
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-300);
    }

    .toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-300);
    }

    .status-line {
      font-size: var(--fs-300);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .status-line[data-tone="error"] {
      color: #964343;
    }

    .inventory-groups {
      display: grid;
      gap: var(--spacing-400);
    }

    details.inventory-group:not([open]) {
      gap: 0;
    }


    .inventory-group {
      overflow: hidden;
    }

    .inventory-group summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-300);
      padding: var(--spacing-400);
      background: color-mix(in oklch, var(--clr-surface), white 6%);
    }

    .inventory-group summary::-webkit-details-marker {
      display: none;
    }

    .summary-title {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-300);
      align-items: baseline;
    }

    .summary-count {
      opacity: 0.75;
      font-size: var(--fs-300);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .inventory-table td[data-mismatch="true"] {
      background: color-mix(in oklch, var(--clr-primary), transparent 82%);
    }

    .inventory-table :is(th, td):nth-child(3),
    .inventory-table :is(th, td):nth-child(4) {
      width: 9rem;
    }

    .inventory-table input[disabled] {
      opacity: 0.6;
    }

    .inventory-table input[type="number"] {
      max-width: 5.5rem;
      text-align: center;
      margin-inline: auto;
    }

    .inventory-table .sku-cell {
      font-size: var(--fs-300);
      white-space: nowrap;
    }

    .inventory-table .variant-cell {
      min-width: 16rem;
    }

    .inventory-table abbr {
      text-decoration: none;
    }

    .loading-block,
    .empty-state {
      text-align: center;
      padding: var(--spacing-700);
    }

    .loading-block h2 {
      display: grid;
      place-items: center;
      gap: var(--spacing-300);
    }

    .loading-block h2::after {
      content: '';
      inline-size: 3ch;
      block-size: 3ch;
      aspect-ratio: 1;
      border: 5px solid var(--clr-neutral-0);
      border-bottom-color: transparent;
      border-radius: 50%;
      display: inline-block;
      animation: rotation 1s linear infinite;
    }

    .muted {
      opacity: 0.75;
    }

    @media (max-width: 768px) {
      .inventory-shell {
        padding: var(--spacing-300);
      }
    }

    @keyframes rotation {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  }

  /* END @layer project */
</style>
